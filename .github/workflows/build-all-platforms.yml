# =============================================================================
# VNOffice — Build All Platforms (Windows .exe, macOS .dmg, Linux .deb)
# =============================================================================
# Owner:   PHẠM VĂN THƯƠNG (info@vnoffice.org)
# License: MPL 2.0 (based on LibreOffice)
# =============================================================================

name: Build VNOffice

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # Cho phép chạy thủ công

env:
  VNOFFICE_VERSION: "1.0.0"
  VNOFFICE_VENDOR: "PHẠM VĂN THƯƠNG"
  VNOFFICE_EMAIL: "info@vnoffice.org"
  LIBREOFFICE_BRANCH: "libreoffice-25-2"
  BUILD_LANGS: "vi en-US"

jobs:
  # =========================================================================
  # 🐧 BUILD LINUX (.deb)
  # =========================================================================
  build-linux:
    name: 🐧 Build Linux (.deb)
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: 📥 Checkout VNOffice config
        uses: actions/checkout@v4

      - name: 🔧 Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get build-dep -y libreoffice || true
          sudo apt-get install -y \
            git ccache autoconf automake libtool \
            gcc-12 g++-12 \
            libcups2-dev libfontconfig1-dev libunwind-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            libgtk-3-dev libkrb5-dev \
            nasm junit4 ant default-jdk \
            bison flex gperf \
            libxrandr-dev libxrender-dev libxext-dev \
            libx11-dev libxt-dev \
            zip unzip wget python3-dev \
            epm
          # Set GCC 12 as default
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-12 120
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-12 120

      - name: 💾 Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-linux-${{ github.sha }}
          restore-keys: ccache-linux-

      - name: 📥 Clone LibreOffice source
        run: |
          git clone --depth 1 --branch ${{ env.LIBREOFFICE_BRANCH }} \
            https://git.libreoffice.org/core libreoffice-core || \
          git clone --depth 1 https://git.libreoffice.org/core libreoffice-core

      - name: 📥 Clone translations (Vietnamese)
        run: |
          cd libreoffice-core
          git clone --depth 1 https://git.libreoffice.org/translations

      - name: 🎨 Apply VNOffice branding
        run: |
          cd libreoffice-core
          chmod +x $GITHUB_WORKSPACE/scripts/apply-branding.sh
          bash $GITHUB_WORKSPACE/scripts/apply-branding.sh

      - name: ⚙️ Configure build
        run: |
          cd libreoffice-core
          cat > autogen.input << 'EOF'
          --with-vendor=PHẠM VĂN THƯƠNG - info@vnoffice.org
          --with-package-version=${{ env.VNOFFICE_VERSION }}
          --with-lang=vi en-US
          --enable-release-build
          --disable-online-update
          --disable-odk
          --with-package-format=deb
          --with-parallelism=$(nproc)
          --enable-ccache
          --enable-epm
          --without-doxygen
          --without-help
          EOF
          ./autogen.sh

      - name: 🔨 Build VNOffice
        run: |
          cd libreoffice-core
          make -j$(nproc) 2>&1 | tail -50

      - name: 📦 Create .deb package
        run: |
          cd libreoffice-core
          make distro-pack-deb || true
          # Tìm file .deb
          find . -name "*.deb" -type f 2>/dev/null | head -20

      - name: 📤 Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: vnoffice-linux-deb
          path: |
            libreoffice-core/workdir/installation/**/*.deb
            libreoffice-core/instdir/**
          retention-days: 30

  # =========================================================================
  # 🪟 BUILD WINDOWS (.exe / .msi) — Giao diện cài đặt tiếng Việt
  # =========================================================================
  build-windows:
    name: 🪟 Build Windows (.exe)
    runs-on: windows-2022
    timeout-minutes: 480

    steps:
      - name: 📥 Checkout VNOffice config
        uses: actions/checkout@v4

      - name: 🔧 Setup Cygwin
        uses: egor-tensin/setup-cygwin@v4
        with:
          packages: autoconf automake bison flex gcc-g++ git gnupg gperf make openssh perl pkg-config python3 wget zip unzip patch ccache

      - name: 💾 Cache ccache
        uses: actions/cache@v4
        with:
          path: C:\cygwin64\home\runneradmin\.ccache
          key: ccache-windows-${{ github.sha }}
          restore-keys: ccache-windows-

      - name: 📥 Clone LibreOffice source
        shell: cmd
        run: |
          C:\cygwin64\bin\bash.exe -lc "cd /cygdrive/d && git clone --depth 1 --branch libreoffice-25-2 https://git.libreoffice.org/core libreoffice-core || git clone --depth 1 https://git.libreoffice.org/core libreoffice-core"

      - name: 📥 Clone translations (Vietnamese)
        shell: cmd
        run: |
          C:\cygwin64\bin\bash.exe -lc "cd /cygdrive/d/libreoffice-core && git clone --depth 1 https://git.libreoffice.org/translations"

      - name: 🎨 Apply VNOffice branding
        shell: cmd
        run: |
          C:\cygwin64\bin\bash.exe -lc "cd /cygdrive/d/libreoffice-core && export VNOFFICE_VERSION='${{ env.VNOFFICE_VERSION }}' && bash $(cygpath -u '%GITHUB_WORKSPACE%')/scripts/apply-branding.sh"

      - name: ⚙️ Configure & Build
        shell: cmd
        run: |
          C:\cygwin64\bin\bash.exe -lc "cd /cygdrive/d/libreoffice-core && printf '--with-vendor=PH\u1ea0M V\u0102N TH\u01af\u01a0NG - info@vnoffice.org\n--with-package-version=${{ env.VNOFFICE_VERSION }}\n--with-lang=vi en-US\n--enable-release-build\n--disable-online-update\n--disable-odk\n--without-doxygen\n--without-help\n--with-package-format=msi\n--enable-epm\n--enable-ccache\n' > autogen.input && ./autogen.sh && make 2>&1 | tail -50"

      - name: 📦 Create Windows Installer (.msi)
        shell: cmd
        run: |
          C:\cygwin64\bin\bash.exe -lc "cd /cygdrive/d/libreoffice-core && make distro-pack-install || true && find . -name '*.msi' -o -name '*.exe' | head -20"

      - name: 📤 Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: vnoffice-windows-installer
          path: |
            D:\libreoffice-core\workdir\installation\**\*.msi
            D:\libreoffice-core\workdir\installation\**\*.exe
            D:\libreoffice-core\instdir\**
          retention-days: 30

  # =========================================================================
  # 🍎 BUILD macOS (.dmg) — Giao diện tiếng Việt
  # =========================================================================
  build-macos:
    name: 🍎 Build macOS (.dmg)
    runs-on: macos-14
    timeout-minutes: 480

    steps:
      - name: 📥 Checkout VNOffice config
        uses: actions/checkout@v4

      - name: 🔧 Install dependencies
        run: |
          brew install autoconf automake ccache pkg-config \
            gettext gperf nasm ant make
          # Add GNU make to PATH (brew installs as gmake, we need 'make' >= 4.0)
          echo "$(brew --prefix)/opt/make/libexec/gnubin" >> $GITHUB_PATH

      - name: 💾 Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/ccache
          key: ccache-macos-${{ github.sha }}
          restore-keys: ccache-macos-

      - name: 📥 Clone LibreOffice source
        run: |
          git clone --depth 1 --branch ${{ env.LIBREOFFICE_BRANCH }} \
            https://git.libreoffice.org/core libreoffice-core || \
          git clone --depth 1 https://git.libreoffice.org/core libreoffice-core

      - name: 📥 Clone translations (Vietnamese)
        run: |
          cd libreoffice-core
          git clone --depth 1 https://git.libreoffice.org/translations

      - name: 🎨 Apply VNOffice branding
        run: |
          cd libreoffice-core
          chmod +x $GITHUB_WORKSPACE/scripts/apply-branding.sh
          export VNOFFICE_VERSION="${{ env.VNOFFICE_VERSION }}"
          bash $GITHUB_WORKSPACE/scripts/apply-branding.sh

      - name: ⚙️ Configure build
        run: |
          cd libreoffice-core
          cat > autogen.input << 'EOF'
          --with-vendor=PHẠM VĂN THƯƠNG - info@vnoffice.org
          --with-package-version=${{ env.VNOFFICE_VERSION }}
          --with-lang=vi en-US
          --enable-release-build
          --disable-online-update
          --disable-odk
          --without-doxygen
          --without-help
          --enable-ccache
          EOF
          ./autogen.sh

      - name: 🔨 Build VNOffice
        run: |
          cd libreoffice-core
          make -j$(sysctl -n hw.ncpu) 2>&1 | tail -50

      - name: 📦 Create .dmg
        run: |
          cd libreoffice-core
          # Tạo DMG với tên VNOffice
          make mac-app-store-package || true

          # Fallback: tạo DMG thủ công
          APP=$(find instdir -name "*.app" -maxdepth 1 | head -1)
          if [ -n "$APP" ]; then
            # Đổi tên app
            NEW_APP="instdir/VNOffice.app"
            mv "$APP" "$NEW_APP" 2>/dev/null || true

            # Sửa Info.plist cho tiếng Việt
            PLIST="$NEW_APP/Contents/Info.plist"
            if [ -f "$PLIST" ]; then
              /usr/libexec/PlistBuddy -c "Set :CFBundleName VNOffice" "$PLIST" 2>/dev/null || true
              /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName VNOffice" "$PLIST" 2>/dev/null || true
            fi

            # Tạo DMG
            hdiutil create -volname "VNOffice" \
              -srcfolder "$NEW_APP" \
              -ov -format UDZO \
              "VNOffice-${{ env.VNOFFICE_VERSION }}-macOS.dmg"
          fi

          find . -name "*.dmg" | head -5

      - name: 📤 Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: vnoffice-macos-dmg
          path: |
            libreoffice-core/*.dmg
            libreoffice-core/workdir/installation/**/*.dmg
          retention-days: 30

  # =========================================================================
  # 🚀 CREATE RELEASE — Tự động tạo trang download
  # =========================================================================
  release:
    name: 🚀 Create GitHub Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: 📥 Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: 🚀 Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "VNOffice ${{ github.ref_name }} — Bộ phần mềm văn phòng miễn phí"
          body: |
            # 🇻🇳 VNOffice ${{ github.ref_name }}

            **Bộ phần mềm văn phòng miễn phí** cho cá nhân và doanh nghiệp.

            ## 📦 Tải về
            | Hệ điều hành | File |
            |---|---|
            | 🪟 Windows | VNOffice-Setup.msi |
            | 🍎 macOS | VNOffice.dmg |
            | 🐧 Linux | vnoffice.deb |

            ## ✨ Tính năng
            - 📝 **VNOffice Writer** — Soạn thảo văn bản (thay Word)
            - 📊 **VNOffice Calc** — Bảng tính (thay Excel)
            - 🎬 **VNOffice Impress** — Trình chiếu (thay PowerPoint)
            - 🖼️ **VNOffice Draw** — Vẽ sơ đồ (thay Visio)
            - 🗄️ **VNOffice Base** — Cơ sở dữ liệu (thay Access)
            - 🔢 **VNOffice Math** — Công thức toán

            ## 📄 Hỗ trợ định dạng file
            ✅ .docx .doc .xlsx .xls .pptx .ppt .pdf .odt .ods .odp

            ## 🇻🇳 Đặc biệt cho người Việt
            - Giao diện & cài đặt **100% tiếng Việt**
            - Font tiếng Việt có sẵn
            - Templates công văn, hợp đồng, bảng lương VN
            - Cấu hình mặc định chuẩn Việt Nam

            ## 📞 Liên hệ
            - **Chủ sở hữu**: PHẠM VĂN THƯƠNG
            - **Email**: info@vnoffice.org
            - **Giấy phép**: MPL 2.0 — Miễn phí, không giới hạn
          files: release-artifacts/**/*
          draft: false
          prerelease: false
