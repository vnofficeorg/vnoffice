# =============================================================================
# VNOffice — Build Windows + macOS
# =============================================================================
# Owner:   PHẠM VĂN THƯƠNG (info@vnoffice.org)
# License: MPL 2.0 (based on LibreOffice)
#
# Note: Linux build tạm tắt. Chỉ build Windows + macOS.
# =============================================================================

name: Build VNOffice

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  VNOFFICE_VERSION: "1.0.0"
  VNOFFICE_VENDOR: "PHẠM VĂN THƯƠNG"
  VNOFFICE_EMAIL: "info@vnoffice.org"
  LIBREOFFICE_BRANCH: "libreoffice-25-2"
  BUILD_LANGS: "en-US"

jobs:
  # =========================================================================
  # 🪟 BUILD WINDOWS (.msi)
  # =========================================================================
  build-windows:
    name: 🪟 Build Windows (.exe)
    runs-on: windows-2022
    timeout-minutes: 480

    steps:
      - name: 📥 Checkout VNOffice config
        uses: actions/checkout@v4

      - name: 🔧 Setup Cygwin
        uses: egor-tensin/setup-cygwin@v4
        with:
          packages: >-
            autoconf automake bison flex gcc-g++ git gnupg gperf
            make openssh perl pkg-config python3 wget zip unzip
            patch ccache gettext-devel libtool

      # ---------------------------------------------------------------
      # Inject VS paths vào Cygwin ~/.bash_profile
      # Cách hoạt động:
      #   1. cmd gọi vcvars64.bat → lấy đường dẫn cl.exe, INCLUDE, LIB
      #   2. Dùng cygpath chuyển Windows paths → Cygwin paths
      #   3. Ghi vào ~/.bash_profile → mọi bash --login -c đều có VS env
      #
      # Đây là cách đáng tin cậy nhất vì --login luôn source ~/.bash_profile
      # ---------------------------------------------------------------
      - name: 🔧 Inject VS environment into Cygwin bash_profile
        shell: cmd
        run: |
          @echo off
          for /f "usebackq delims=" %%i in (`"C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath`) do set VS_PATH=%%i
          echo Found Visual Studio at: %VS_PATH%
          call "%VS_PATH%\VC\Auxiliary\Build\vcvars64.bat" >nul 2>&1

          echo === Verifying MSVC tools in cmd ===
          where cl.exe
          where lib.exe
          where link.exe

          :: Lấy thư mục chứa cl.exe
          for /f "delims=" %%p in ('where cl.exe') do set CL_FULL_PATH=%%p
          for %%d in ("%CL_FULL_PATH%") do set CL_DIR=%%~dpd

          :: Ghi VS paths vào Cygwin ~/.bash_profile
          :: Dùng cygpath để convert Windows → Cygwin path
          echo === Writing VS env to ~/.bash_profile ===
          C:\tools\cygwin\bin\bash.exe -c "echo '' >> ~/.bash_profile"
          C:\tools\cygwin\bin\bash.exe -c "echo '# === Visual Studio environment (auto-generated) ===' >> ~/.bash_profile"
          C:\tools\cygwin\bin\bash.exe -c "CL_CYG=$(cygpath -u '%CL_DIR%'); echo \"export PATH=\\\"${CL_CYG}:\\\$PATH\\\"\" >> ~/.bash_profile"
          C:\tools\cygwin\bin\bash.exe -c "echo 'export INCLUDE=\"%INCLUDE%\"' >> ~/.bash_profile"
          C:\tools\cygwin\bin\bash.exe -c "echo 'export LIB=\"%LIB%\"' >> ~/.bash_profile"
          C:\tools\cygwin\bin\bash.exe -c "echo 'export LIBPATH=\"%LIBPATH%\"' >> ~/.bash_profile"
          C:\tools\cygwin\bin\bash.exe -c "echo '# === End VS environment ===' >> ~/.bash_profile"

          echo === bash_profile contents ===
          C:\tools\cygwin\bin\bash.exe -c "cat ~/.bash_profile"

      - name: 🔧 Verify cl.exe available in Cygwin login shell
        shell: cmd
        run: |
          C:\tools\cygwin\bin\bash.exe --login -c "echo '=== Checking cl.exe ===' && which cl.exe && echo 'OK: cl.exe found' || (echo 'ERROR: cl.exe NOT in PATH' && echo 'PATH entries:' && echo $PATH | tr ':' '\n' | head -20 && exit 1)"

      - name: 💾 Cache ccache
        uses: actions/cache@v4
        with:
          path: C:\tools\cygwin\home\runneradmin\.ccache
          key: ccache-windows-${{ github.sha }}
          restore-keys: ccache-windows-

      - name: 📥 Clone LibreOffice source
        shell: cmd
        run: |
          C:\tools\cygwin\bin\bash.exe -lc "git clone --depth 1 --branch libreoffice-25-2 https://git.libreoffice.org/core ~/libreoffice-core || git clone --depth 1 https://git.libreoffice.org/core ~/libreoffice-core"

      - name: 🎨 Apply VNOffice branding
        shell: cmd
        run: |
          xcopy "%GITHUB_WORKSPACE%\scripts" "C:\tools\cygwin\home\runneradmin\vnoffice-scripts\" /E /I /Y
          xcopy "%GITHUB_WORKSPACE%\branding" "C:\tools\cygwin\home\runneradmin\branding\" /E /I /Y >nul 2>&1
          xcopy "%GITHUB_WORKSPACE%\templates" "C:\tools\cygwin\home\runneradmin\templates\" /E /I /Y >nul 2>&1
          C:\tools\cygwin\bin\bash.exe -lc "cd ~/libreoffice-core && export VNOFFICE_VERSION='1.0.0' && sed -i 's/\r$//' ~/vnoffice-scripts/*.sh && bash ~/vnoffice-scripts/apply-branding.sh"

      - name: ⚙️ Configure
        shell: cmd
        run: |
          C:\tools\cygwin\bin\bash.exe -lc "cd ~/libreoffice-core && echo '--with-vendor=PHAM VAN THUONG - info@vnoffice.org' > autogen.input && echo '--with-package-version=1.0.0' >> autogen.input && echo '--with-lang=en-US' >> autogen.input && echo '--enable-release-build' >> autogen.input && echo '--disable-online-update' >> autogen.input && echo '--disable-odk' >> autogen.input && echo '--without-doxygen' >> autogen.input && echo '--without-help' >> autogen.input && echo '--without-junit' >> autogen.input && echo '--without-java' >> autogen.input && echo '--with-package-format=msi' >> autogen.input && echo '--enable-ccache' >> autogen.input && echo '=== autogen.input ===' && cat autogen.input && echo '=== Verifying cl.exe ===' && which cl.exe 2>/dev/null && echo 'cl.exe OK' || echo 'ERROR: cl.exe not found' && ./autogen.sh"

      - name: 🔨 Build VNOffice
        shell: cmd
        run: |
          C:\tools\cygwin\bin\bash.exe -lc "cd ~/libreoffice-core && make 2>&1 | tail -500"

      - name: 📦 Verify Windows packages
        shell: cmd
        run: |
          C:\tools\cygwin\bin\bash.exe -lc "cd ~/libreoffice-core && echo '=== MSI files ===' && find workdir/installation -name '*.msi' -o -name '*.exe' 2>/dev/null | head -20 && echo '=== instdir ===' && ls -lh instdir/ 2>/dev/null | head -20"

      - name: 📤 Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: vnoffice-windows-installer
          path: |
            C:\tools\cygwin\home\runneradmin\libreoffice-core\workdir\installation\**\*.msi
            C:\tools\cygwin\home\runneradmin\libreoffice-core\workdir\installation\**\*.exe
            C:\tools\cygwin\home\runneradmin\libreoffice-core\instdir\**
          retention-days: 30

  # =========================================================================
  # 🍎 BUILD macOS (.dmg)
  # =========================================================================
  build-macos:
    name: 🍎 Build macOS (.dmg)
    runs-on: macos-14
    timeout-minutes: 480

    steps:
      - name: 📥 Checkout VNOffice config
        uses: actions/checkout@v4

      # ---------------------------------------------------------------
      # Fix: Java 17 LTS
      # macos-14 runner (2026) mặc định Java 25 đã remove Security Manager
      # → hsqldb build lỗi fatal. Java 17 LTS vẫn hỗ trợ đầy đủ.
      # ---------------------------------------------------------------
      - name: ☕ Setup Java 17 LTS
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: ☕ Verify Java version
        run: |
          echo "=== Java version ==="
          java -version 2>&1
          echo "=== JAVA_HOME ==="
          echo "$JAVA_HOME"
          # Fail early nếu Java quá mới
          JAVA_MAJOR=$(java -version 2>&1 | head -1 | sed 's/.*"\([0-9]*\)\..*/\1/')
          echo "Java major version: $JAVA_MAJOR"
          if [ "$JAVA_MAJOR" -gt "21" ]; then
            echo "::error::Java $JAVA_MAJOR detected! hsqldb requires Java <= 21 (Security Manager removed in 24+)"
            exit 1
          fi

      - name: 🔧 Install dependencies
        run: |
          brew uninstall --ignore-dependencies pkg-config 2>/dev/null || true
          brew install autoconf automake ccache \
            gettext gperf nasm ant make
          echo "$(brew --prefix)/opt/make/libexec/gnubin" >> $GITHUB_PATH
          echo "GNU Make version:" && make --version | head -1

      - name: 💾 Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/ccache
          key: ccache-macos-${{ github.sha }}
          restore-keys: ccache-macos-

      - name: 📥 Clone LibreOffice source
        run: |
          git clone --depth 1 --branch ${{ env.LIBREOFFICE_BRANCH }} \
            https://git.libreoffice.org/core libreoffice-core || \
          git clone --depth 1 https://git.libreoffice.org/core libreoffice-core

      - name: 🎨 Apply VNOffice branding
        run: |
          cd libreoffice-core
          chmod +x $GITHUB_WORKSPACE/scripts/apply-branding.sh
          export VNOFFICE_VERSION="${{ env.VNOFFICE_VERSION }}"
          bash $GITHUB_WORKSPACE/scripts/apply-branding.sh

      - name: ⚙️ Configure build
        run: |
          cd libreoffice-core
          printf '%s\n' \
            "--with-vendor=PHẠM VĂN THƯƠNG - info@vnoffice.org" \
            "--with-package-version=${{ env.VNOFFICE_VERSION }}" \
            "--with-lang=${{ env.BUILD_LANGS }}" \
            "--enable-release-build" \
            "--disable-online-update" \
            "--disable-odk" \
            "--without-doxygen" \
            "--without-help" \
            "--without-junit" \
            "--with-jdk-home=$JAVA_HOME" \
            "--enable-ccache" \
            "--disable-scripting-beanshell" \
            "--disable-scripting-javascript" \
            > autogen.input
          echo "=== autogen.input ==="
          cat autogen.input
          ./autogen.sh

      - name: 🔨 Build VNOffice
        run: |
          set -o pipefail
          cd libreoffice-core
          make -j$(sysctl -n hw.ncpu) 2>&1 | tail -500

      - name: 📦 Create .dmg
        run: |
          cd libreoffice-core

          APP=$(find instdir -name "*.app" -maxdepth 1 2>/dev/null | head -1)
          if [ -z "$APP" ]; then
            echo "::error::Không tìm thấy .app trong instdir/"
            ls -la instdir/ 2>/dev/null
            exit 1
          fi

          echo "Found app: $APP"

          NEW_APP="instdir/VNOffice.app"
          mv "$APP" "$NEW_APP"

          PLIST="$NEW_APP/Contents/Info.plist"
          if [ -f "$PLIST" ]; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleName VNOffice" "$PLIST" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName VNOffice" "$PLIST" 2>/dev/null || true
          fi

          hdiutil create -volname "VNOffice" \
            -srcfolder "$NEW_APP" \
            -ov -format UDZO \
            "VNOffice-${{ env.VNOFFICE_VERSION }}-macOS.dmg"

          echo "=== DMG files ==="
          ls -lh *.dmg 2>/dev/null

      - name: 📤 Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: vnoffice-macos-dmg
          path: |
            libreoffice-core/*.dmg
            libreoffice-core/workdir/installation/**/*.dmg
          retention-days: 30

  # =========================================================================
  # 🚀 CREATE RELEASE
  # =========================================================================
  release:
    name: 🚀 Create GitHub Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: 📥 Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: 🚀 Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "VNOffice ${{ github.ref_name }} — Bộ phần mềm văn phòng miễn phí"
          body: |
            # 🇻🇳 VNOffice ${{ github.ref_name }}

            **Bộ phần mềm văn phòng miễn phí** cho cá nhân và doanh nghiệp.

            ## 📦 Tải về
            | Hệ điều hành | File |
            |---|---|
            | 🪟 Windows | VNOffice-Setup.msi |
            | 🍎 macOS | VNOffice.dmg |

            ## ✨ Tính năng
            - 📝 **VNOffice Writer** — Soạn thảo văn bản (thay Word)
            - 📊 **VNOffice Calc** — Bảng tính (thay Excel)
            - 🎬 **VNOffice Impress** — Trình chiếu (thay PowerPoint)
            - 🖼️ **VNOffice Draw** — Vẽ sơ đồ (thay Visio)
            - 🗄️ **VNOffice Base** — Cơ sở dữ liệu (thay Access)
            - 🔢 **VNOffice Math** — Công thức toán

            ## 📄 Hỗ trợ định dạng file
            ✅ .docx .doc .xlsx .xls .pptx .ppt .pdf .odt .ods .odp

            ## 🇻🇳 Đặc biệt cho người Việt
            - Giao diện & cài đặt **100% tiếng Việt**
            - Font tiếng Việt có sẵn
            - Templates công văn, hợp đồng, bảng lương VN
            - Cấu hình mặc định chuẩn Việt Nam

            ## 📞 Liên hệ
            - **Chủ sở hữu**: PHẠM VĂN THƯƠNG
            - **Email**: info@vnoffice.org
            - **Giấy phép**: MPL 2.0 — Miễn phí, không giới hạn
          files: release-artifacts/**/*
          draft: false
          prerelease: false
