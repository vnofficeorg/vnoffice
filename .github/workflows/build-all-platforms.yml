# =============================================================================
# VNOffice — Build All Platforms (Windows .exe, macOS .dmg, Linux .deb)
# =============================================================================
# Owner:   PHẠM VĂN THƯƠNG (info@vnoffice.org)
# License: MPL 2.0 (based on LibreOffice)
# =============================================================================

name: Build VNOffice

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # Cho phép chạy thủ công

env:
  VNOFFICE_VERSION: "1.0.0.1"
  VNOFFICE_VENDOR: "PHẠM VĂN THƯƠNG"
  VNOFFICE_EMAIL: "info@vnoffice.org"
  LIBREOFFICE_BRANCH: "libreoffice-25-2"
  # TODO: Đổi thành "vi en-US" khi build English đã ổn định
  BUILD_LANGS: "en-US"

jobs:
  # =========================================================================
  # 🐧 BUILD LINUX (.deb)
  # =========================================================================
  build-linux:
    name: 🐧 Build Linux (.deb)
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: 📥 Checkout VNOffice config
        uses: actions/checkout@v4

      - name: ☕ Setup Java 21 LTS
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 🔧 Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get build-dep -y libreoffice || true
          sudo apt-get install -y \
            git ccache autoconf automake libtool \
            gcc-12 g++-12 \
            libcups2-dev libfontconfig1-dev libunwind-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            libgtk-3-dev libkrb5-dev \
            libxslt1-dev libxml2-dev libxml2-utils \
            libcurl4-openssl-dev libssl-dev \
            libnss3-dev libnspr4-dev \
            nasm junit4 ant \
            bison flex gperf \
            libxrandr-dev libxrender-dev libxext-dev \
            libx11-dev libxt-dev \
            zip unzip wget python3-dev \
            xsltproc epm gettext
          # Set GCC 12 as default
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-12 120
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-12 120
          # Verify Java version
          echo "Java version:" && java -version

      - name: 💾 Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-linux-${{ github.sha }}
          restore-keys: ccache-linux-

      - name: 📥 Clone LibreOffice source
        run: |
          git clone --depth 1 --branch ${{ env.LIBREOFFICE_BRANCH }} \
            https://git.libreoffice.org/core libreoffice-core || \
          git clone --depth 1 https://git.libreoffice.org/core libreoffice-core

      # TODO: Bật lại khi thêm tiếng Việt (--with-lang="vi en-US")
      # - name: 📥 Clone translations (Vietnamese)
      #   run: |
      #     cd libreoffice-core
      #     git clone --depth 1 https://git.libreoffice.org/translations

      - name: 🎨 Apply VNOffice branding
        run: |
          cd libreoffice-core
          chmod +x $GITHUB_WORKSPACE/scripts/apply-branding.sh
          bash $GITHUB_WORKSPACE/scripts/apply-branding.sh

      - name: ⚙️ Configure build
        run: |
          cd libreoffice-core
          printf '%s\n' \
            "--with-vendor=PHẠM VĂN THƯƠNG - info@vnoffice.org" \
            "--with-package-version=${{ env.VNOFFICE_VERSION }}" \
            "--with-lang=${{ env.BUILD_LANGS }}" \
            "--enable-release-build" \
            "--disable-online-update" \
            "--disable-odk" \
            "--with-package-format=deb" \
            "--with-parallelism=$(nproc)" \
            "--enable-ccache" \
            "--enable-epm" \
            "--without-doxygen" \
            "--without-help" \
            "--without-junit" \
            > autogen.input
          cat autogen.input
          ./autogen.sh

      - name: 🔨 Build VNOffice
        run: |
          set -o pipefail
          cd libreoffice-core
          make -j$(nproc) 2>&1 | tail -500

      - name: 📦 Verify .deb packages
        run: |
          cd libreoffice-core
          echo "=== Tìm file .deb ==="
          find workdir/installation -name "*.deb" -type f 2>/dev/null | head -20
          echo "=== Kiểm tra instdir ==="
          ls -lh instdir/ 2>/dev/null | head -20
          DEB_COUNT=$(find workdir/installation -name "*.deb" -type f 2>/dev/null | wc -l)
          echo "Tổng số file .deb: $DEB_COUNT"
          if [ "$DEB_COUNT" -eq 0 ]; then
            echo "::warning::Không tìm thấy file .deb nào trong workdir/installation/"
          fi

      - name: 📤 Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: vnoffice-linux-deb
          path: |
            libreoffice-core/workdir/installation/**/*.deb
            libreoffice-core/instdir/**
          retention-days: 30

  # =========================================================================
  # 🪟 BUILD WINDOWS (.exe / .msi)
  # =========================================================================
  build-windows:
    name: 🪟 Build Windows (.exe)
    runs-on: windows-2022
    timeout-minutes: 480

    steps:
      - name: 📥 Checkout VNOffice config
        uses: actions/checkout@v4

      - name: 🔧 Setup Cygwin
        uses: egor-tensin/setup-cygwin@v4
        with:
          packages: autoconf automake bison flex gcc-g++ git gnupg gperf make openssh perl pkg-config python3 wget zip unzip patch ccache gettext-devel libtool

      - name: 🔧 Export Visual Studio environment for Cygwin
        shell: cmd
        run: |
          @echo off
          :: Detect VS2022 installation path
          for /f "usebackq delims=" %%i in (`"C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath`) do set VS_PATH=%%i
          echo Found Visual Studio at: %VS_PATH%
          :: Call vcvars64.bat and export env vars to a file Cygwin can source
          call "%VS_PATH%\VC\Auxiliary\Build\vcvars64.bat" >nul 2>&1
          :: Write key env vars to a file
          echo VS_PATH=%VS_PATH%> %GITHUB_ENV%
          echo INCLUDE=%INCLUDE%>> %GITHUB_ENV%
          echo LIB=%LIB%>> %GITHUB_ENV%
          echo LIBPATH=%LIBPATH%>> %GITHUB_ENV%
          :: Also add cl.exe to PATH
          for /f "delims=" %%p in ('where cl.exe') do set CL_DIR=%%~dpp
          echo CL_DIR=%CL_DIR%>> %GITHUB_ENV%

      - name: 💾 Cache ccache
        uses: actions/cache@v4
        with:
          path: C:\tools\cygwin\home\runneradmin\.ccache
          key: ccache-windows-${{ github.sha }}
          restore-keys: ccache-windows-

      - name: 📥 Clone LibreOffice source
        shell: cmd
        run: |
          C:\tools\cygwin\bin\bash.exe -lc "cd ~ && git clone --depth 1 --branch libreoffice-25-2 https://git.libreoffice.org/core libreoffice-core || git clone --depth 1 https://git.libreoffice.org/core libreoffice-core"

      # TODO: Bật lại khi thêm tiếng Việt (--with-lang="vi en-US")
      # - name: 📥 Clone translations (Vietnamese)
      #   shell: cmd
      #   run: |
      #     C:\tools\cygwin\bin\bash.exe -lc "cd ~/libreoffice-core && git clone --depth 1 https://git.libreoffice.org/translations"

      - name: 🎨 Apply VNOffice branding
        shell: cmd
        run: |
          xcopy "%GITHUB_WORKSPACE%\scripts" "C:\tools\cygwin\home\runneradmin\vnoffice-scripts\" /E /I /Y
          xcopy "%GITHUB_WORKSPACE%\branding" "C:\tools\cygwin\home\runneradmin\branding\" /E /I /Y >nul 2>&1
          xcopy "%GITHUB_WORKSPACE%\templates" "C:\tools\cygwin\home\runneradmin\templates\" /E /I /Y >nul 2>&1
          C:\tools\cygwin\bin\bash.exe -lc "cd ~/libreoffice-core && export VNOFFICE_VERSION='${{ env.VNOFFICE_VERSION }}' && sed -i 's/\r$//' ~/vnoffice-scripts/*.sh && bash ~/vnoffice-scripts/apply-branding.sh"

      - name: ⚙️ Configure
        shell: cmd
        run: |
          @echo off
          :: Re-initialize VS environment in this step
          for /f "usebackq delims=" %%i in (`"C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath`) do set VS_PATH=%%i
          call "%VS_PATH%\VC\Auxiliary\Build\vcvars64.bat" >nul 2>&1
          :: Run configure inside Cygwin with VS env inherited
          C:\tools\cygwin\bin\bash.exe -lc "cd ~/libreoffice-core && { echo '--with-vendor=PHAM VAN THUONG - info@vnoffice.org'; echo '--with-package-version=${{ env.VNOFFICE_VERSION }}'; echo '--with-lang=${{ env.BUILD_LANGS }}'; echo '--enable-release-build'; echo '--disable-online-update'; echo '--disable-odk'; echo '--without-doxygen'; echo '--without-help'; echo '--without-junit'; echo '--with-package-format=msi'; echo '--enable-epm'; echo '--enable-ccache'; } > autogen.input && cat autogen.input && ./autogen.sh"

      - name: 🔨 Build VNOffice
        shell: cmd
        run: |
          @echo off
          for /f "usebackq delims=" %%i in (`"C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath`) do set VS_PATH=%%i
          call "%VS_PATH%\VC\Auxiliary\Build\vcvars64.bat" >nul 2>&1
          C:\tools\cygwin\bin\bash.exe -lc "cd ~/libreoffice-core && make 2>&1 | tail -500"

      - name: 📦 Verify Windows packages
        shell: cmd
        run: |
          C:\tools\cygwin\bin\bash.exe -lc "cd ~/libreoffice-core && echo '=== Tim file .msi ===' && find workdir/installation -name '*.msi' -o -name '*.exe' 2>/dev/null | head -20 && echo '=== Kiem tra instdir ===' && ls -lh instdir/ 2>/dev/null | head -20"

      - name: 📤 Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: vnoffice-windows-installer
          path: |
            C:\tools\cygwin\home\runneradmin\libreoffice-core\workdir\installation\**\*.msi
            C:\tools\cygwin\home\runneradmin\libreoffice-core\workdir\installation\**\*.exe
            C:\tools\cygwin\home\runneradmin\libreoffice-core\instdir\**
          retention-days: 30

  # =========================================================================
  # 🍎 BUILD macOS (.dmg)
  # =========================================================================
  build-macos:
    name: 🍎 Build macOS (.dmg)
    runs-on: macos-14
    timeout-minutes: 480

    steps:
      - name: 📥 Checkout VNOffice config
        uses: actions/checkout@v4

      - name: ☕ Setup Java 21 LTS
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 🔧 Install dependencies
        run: |
          # Uninstall homebrew pkg-config (LibreOffice configure rejects it)
          brew uninstall --ignore-dependencies pkg-config 2>/dev/null || true
          brew install autoconf automake ccache \
            gettext gperf nasm ant make
          # Add GNU make to PATH (brew installs as gmake, we need 'make' >= 4.0)
          echo "$(brew --prefix)/opt/make/libexec/gnubin" >> $GITHUB_PATH
          # Verify Java version
          echo "Java version:" && java -version

      - name: 💾 Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/ccache
          key: ccache-macos-${{ github.sha }}
          restore-keys: ccache-macos-

      - name: 📥 Clone LibreOffice source
        run: |
          git clone --depth 1 --branch ${{ env.LIBREOFFICE_BRANCH }} \
            https://git.libreoffice.org/core libreoffice-core || \
          git clone --depth 1 https://git.libreoffice.org/core libreoffice-core

      # TODO: Bật lại khi thêm tiếng Việt (--with-lang="vi en-US")
      # - name: 📥 Clone translations (Vietnamese)
      #   run: |
      #     cd libreoffice-core
      #     git clone --depth 1 https://git.libreoffice.org/translations

      - name: 🎨 Apply VNOffice branding
        run: |
          cd libreoffice-core
          chmod +x $GITHUB_WORKSPACE/scripts/apply-branding.sh
          export VNOFFICE_VERSION="${{ env.VNOFFICE_VERSION }}"
          bash $GITHUB_WORKSPACE/scripts/apply-branding.sh

      - name: ⚙️ Configure build
        run: |
          cd libreoffice-core
          printf '%s\n' \
            "--with-vendor=PHẠM VĂN THƯƠNG - info@vnoffice.org" \
            "--with-package-version=${{ env.VNOFFICE_VERSION }}" \
            "--with-lang=${{ env.BUILD_LANGS }}" \
            "--enable-release-build" \
            "--disable-online-update" \
            "--disable-odk" \
            "--without-doxygen" \
            "--without-help" \
            "--without-junit" \
            "--enable-ccache" \
            > autogen.input
          cat autogen.input
          ./autogen.sh

      - name: 🔨 Build VNOffice
        run: |
          set -o pipefail
          cd libreoffice-core
          make -j$(sysctl -n hw.ncpu) 2>&1 | tail -500

      - name: 📦 Create .dmg
        run: |
          cd libreoffice-core

          # Tìm .app trong instdir
          APP=$(find instdir -name "*.app" -maxdepth 1 2>/dev/null | head -1)
          if [ -z "$APP" ]; then
            echo "::error::Không tìm thấy .app trong instdir/"
            ls -la instdir/ 2>/dev/null
            exit 1
          fi

          echo "Found app: $APP"

          # Đổi tên app → VNOffice
          NEW_APP="instdir/VNOffice.app"
          mv "$APP" "$NEW_APP"

          # Sửa Info.plist
          PLIST="$NEW_APP/Contents/Info.plist"
          if [ -f "$PLIST" ]; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleName VNOffice" "$PLIST" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName VNOffice" "$PLIST" 2>/dev/null || true
          fi

          # Tạo DMG
          hdiutil create -volname "VNOffice" \
            -srcfolder "$NEW_APP" \
            -ov -format UDZO \
            "VNOffice-${{ env.VNOFFICE_VERSION }}-macOS.dmg"

          echo "=== DMG files ==="
          find . -name "*.dmg" | head -5
          ls -lh *.dmg 2>/dev/null

      - name: 📤 Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: vnoffice-macos-dmg
          path: |
            libreoffice-core/*.dmg
            libreoffice-core/workdir/installation/**/*.dmg
          retention-days: 30

  # =========================================================================
  # 🚀 CREATE RELEASE — Tự động tạo trang download
  # =========================================================================
  release:
    name: 🚀 Create GitHub Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: 📥 Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: 🚀 Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "VNOffice ${{ github.ref_name }} — Bộ phần mềm văn phòng miễn phí"
          body: |
            # 🇻🇳 VNOffice ${{ github.ref_name }}

            **Bộ phần mềm văn phòng miễn phí** cho cá nhân và doanh nghiệp.

            ## 📦 Tải về
            | Hệ điều hành | File |
            |---|---|
            | 🪟 Windows | VNOffice-Setup.msi |
            | 🍎 macOS | VNOffice.dmg |
            | 🐧 Linux | vnoffice.deb |

            ## ✨ Tính năng
            - 📝 **VNOffice Writer** — Soạn thảo văn bản (thay Word)
            - 📊 **VNOffice Calc** — Bảng tính (thay Excel)
            - 🎬 **VNOffice Impress** — Trình chiếu (thay PowerPoint)
            - 🖼️ **VNOffice Draw** — Vẽ sơ đồ (thay Visio)
            - 🗄️ **VNOffice Base** — Cơ sở dữ liệu (thay Access)
            - 🔢 **VNOffice Math** — Công thức toán

            ## 📄 Hỗ trợ định dạng file
            ✅ .docx .doc .xlsx .xls .pptx .ppt .pdf .odt .ods .odp

            ## 🇻🇳 Đặc biệt cho người Việt
            - Giao diện & cài đặt **100% tiếng Việt**
            - Font tiếng Việt có sẵn
            - Templates công văn, hợp đồng, bảng lương VN
            - Cấu hình mặc định chuẩn Việt Nam

            ## 📞 Liên hệ
            - **Chủ sở hữu**: PHẠM VĂN THƯƠNG
            - **Email**: info@vnoffice.org
            - **Giấy phép**: MPL 2.0 — Miễn phí, không giới hạn
          files: release-artifacts/**/*
          draft: false
          prerelease: false
