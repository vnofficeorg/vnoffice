# =============================================================================
# VNOffice — Build All Platforms (Windows .exe/.msi, macOS .dmg)
# =============================================================================
# Owner:   PHẠM VĂN THƯƠNG (info@vnoffice.org)
# License: MPL 2.0 (based on LibreOffice)
#
# Note: Linux build bị tắt tạm thời do lỗi deb version format.
#       Chỉ build Windows + macOS.
# =============================================================================

name: Build VNOffice

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # Cho phép chạy thủ công

env:
  VNOFFICE_VERSION: "1.0.0"
  VNOFFICE_VENDOR: "PHẠM VĂN THƯƠNG"
  VNOFFICE_EMAIL: "info@vnoffice.org"
  LIBREOFFICE_BRANCH: "libreoffice-25-2"
  BUILD_LANGS: "en-US"

jobs:
  # =========================================================================
  # 🪟 BUILD WINDOWS (.exe / .msi)
  # =========================================================================
  build-windows:
    name: 🪟 Build Windows (.exe)
    runs-on: windows-2022
    timeout-minutes: 480

    steps:
      - name: 📥 Checkout VNOffice config
        uses: actions/checkout@v4

      - name: 🔧 Setup Cygwin
        uses: egor-tensin/setup-cygwin@v4
        with:
          packages: >-
            autoconf automake bison flex gcc-g++ git gnupg gperf
            make openssh perl pkg-config python3 wget zip unzip
            patch ccache gettext-devel libtool

      # ---------------------------------------------------------------
      # Bước quan trọng: Export VS environment ra file để Cygwin source
      # Lỗi cũ: vcvars64 chạy trong cmd nhưng bash -lc tạo login shell
      # mới => env không được kế thừa => configure không tìm thấy cl.exe
      # ---------------------------------------------------------------
      - name: 🔧 Detect Visual Studio and export env for Cygwin
        id: vs-env
        shell: cmd
        run: |
          @echo off
          :: Detect VS2022 installation path
          for /f "usebackq delims=" %%i in (`"C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath`) do set VS_PATH=%%i
          echo Found Visual Studio at: %VS_PATH%

          :: Call vcvars64.bat to set up MSVC environment
          call "%VS_PATH%\VC\Auxiliary\Build\vcvars64.bat" >nul 2>&1

          :: Export VS_PATH to GITHUB_ENV so subsequent steps can use it
          echo VS_PATH=%VS_PATH%>> %GITHUB_ENV%

          :: Find cl.exe path and export it
          for /f "delims=" %%p in ('where cl.exe') do set CL_PATH=%%~dpp
          echo CL_DIR=%CL_PATH%>> %GITHUB_ENV%

          :: Write a Cygwin-sourceable env file with all MSVC paths
          :: Convert Windows paths to Cygwin paths for the critical variables
          C:\tools\cygwin\bin\bash.exe -c "cat > /tmp/vs_env.sh << 'ENVEOF'
          # Auto-generated Visual Studio environment for Cygwin
          export PATH=\"/cygdrive/c/Program Files/Microsoft Visual Studio/2022/Enterprise/VC/Tools/MSVC/14.43.34808/bin/HostX64/x64:$PATH\"
          ENVEOF"

          :: Write the actual PATH additions (with proper cl.exe location)
          echo Detecting cl.exe location...
          where cl.exe
          where link.exe
          where lib.exe

          :: Create a comprehensive env script by dumping the full PATH
          :: after vcvars64.bat has been sourced
          echo set "VSENVPATH=%PATH%"> C:\tools\cygwin\tmp\vs_path.bat
          echo %PATH%> C:\tools\cygwin\tmp\vs_path.txt
          echo %INCLUDE%> C:\tools\cygwin\tmp\vs_include.txt
          echo %LIB%> C:\tools\cygwin\tmp\vs_lib.txt

          :: Export key variables to GITHUB_ENV
          echo INCLUDE=%INCLUDE%>> %GITHUB_ENV%
          echo LIB=%LIB%>> %GITHUB_ENV%
          echo LIBPATH=%LIBPATH%>> %GITHUB_ENV%

      - name: 🔧 Create Cygwin VS environment script
        shell: cmd
        run: |
          @echo off
          :: Re-init VS environment
          for /f "usebackq delims=" %%i in (`"C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath`) do set VS_PATH=%%i
          call "%VS_PATH%\VC\Auxiliary\Build\vcvars64.bat" >nul 2>&1

          :: Write a bash script that Cygwin can source
          :: This converts the Windows PATH to Cygwin format
          C:\tools\cygwin\bin\bash.exe -c "echo '#!/bin/bash' > /tmp/setup_vs.sh && echo '# Visual Studio environment for LibreOffice build' >> /tmp/setup_vs.sh"

          :: Export the full Windows PATH (after vcvars) into the script
          :: We use cygpath to convert it
          C:\tools\cygwin\bin\bash.exe -c "echo 'export WIN_PATH=\"%PATH%\"' | sed 's/\\\\/\//g' >> /tmp/setup_vs.sh"
          C:\tools\cygwin\bin\bash.exe -c "echo 'export INCLUDE=\"%INCLUDE%\"' | sed 's/\\\\/\//g' >> /tmp/setup_vs.sh"
          C:\tools\cygwin\bin\bash.exe -c "echo 'export LIB=\"%LIB%\"' | sed 's/\\\\/\//g' >> /tmp/setup_vs.sh"
          C:\tools\cygwin\bin\bash.exe -c "echo 'export LIBPATH=\"%LIBPATH%\"' | sed 's/\\\\/\//g' >> /tmp/setup_vs.sh"

          :: Convert PATH entries to Cygwin format
          C:\tools\cygwin\bin\bash.exe -c "echo '' >> /tmp/setup_vs.sh && echo '# Convert Windows PATH to Cygwin PATH' >> /tmp/setup_vs.sh && echo 'IFS=\";\" read -ra DIRS <<< \"$WIN_PATH\"' >> /tmp/setup_vs.sh && echo 'CYPATH=\"\"' >> /tmp/setup_vs.sh && echo 'for d in \"${DIRS[@]}\"; do' >> /tmp/setup_vs.sh && echo '  CP=$(cygpath -u \"$d\" 2>/dev/null) && CYPATH=\"$CYPATH:$CP\"' >> /tmp/setup_vs.sh && echo 'done' >> /tmp/setup_vs.sh && echo 'export PATH=\"${CYPATH#:}:$PATH\"' >> /tmp/setup_vs.sh"

          :: Verify the script
          C:\tools\cygwin\bin\bash.exe -c "echo '=== VS env script ===' && cat /tmp/setup_vs.sh"

      - name: 💾 Cache ccache
        uses: actions/cache@v4
        with:
          path: C:\tools\cygwin\home\runneradmin\.ccache
          key: ccache-windows-${{ github.sha }}
          restore-keys: ccache-windows-

      - name: 📥 Clone LibreOffice source
        shell: cmd
        run: |
          C:\tools\cygwin\bin\bash.exe -lc "cd ~ && git clone --depth 1 --branch libreoffice-25-2 https://git.libreoffice.org/core libreoffice-core || git clone --depth 1 https://git.libreoffice.org/core libreoffice-core"

      - name: 🎨 Apply VNOffice branding
        shell: cmd
        run: |
          xcopy "%GITHUB_WORKSPACE%\scripts" "C:\tools\cygwin\home\runneradmin\vnoffice-scripts\" /E /I /Y
          xcopy "%GITHUB_WORKSPACE%\branding" "C:\tools\cygwin\home\runneradmin\branding\" /E /I /Y >nul 2>&1
          xcopy "%GITHUB_WORKSPACE%\templates" "C:\tools\cygwin\home\runneradmin\templates\" /E /I /Y >nul 2>&1
          C:\tools\cygwin\bin\bash.exe -lc "cd ~/libreoffice-core && export VNOFFICE_VERSION='${{ env.VNOFFICE_VERSION }}' && sed -i 's/\r$//' ~/vnoffice-scripts/*.sh && bash ~/vnoffice-scripts/apply-branding.sh"

      # ---------------------------------------------------------------
      # Configure: Phải source VS env TRƯỚC khi gọi autogen.sh
      # Dùng --with-visual-studio chỉ đường dẫn VS installation
      # ---------------------------------------------------------------
      - name: ⚙️ Configure
        shell: cmd
        run: |
          @echo off
          :: Re-initialize VS environment
          for /f "usebackq delims=" %%i in (`"C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath`) do set VS_PATH=%%i
          call "%VS_PATH%\VC\Auxiliary\Build\vcvars64.bat" >nul 2>&1

          :: Now run configure — the key fix is passing --with-visual-studio
          :: and ensuring cl.exe is on the PATH inside Cygwin
          C:\tools\cygwin\bin\bash.exe -lc ^
            "source /tmp/setup_vs.sh 2>/dev/null; ^
             cd ~/libreoffice-core && ^
             { echo '--with-vendor=PHAM VAN THUONG - info@vnoffice.org'; ^
               echo '--with-package-version=${{ env.VNOFFICE_VERSION }}'; ^
               echo '--with-lang=${{ env.BUILD_LANGS }}'; ^
               echo '--enable-release-build'; ^
               echo '--disable-online-update'; ^
               echo '--disable-odk'; ^
               echo '--without-doxygen'; ^
               echo '--without-help'; ^
               echo '--without-junit'; ^
               echo '--without-java'; ^
               echo '--with-package-format=msi'; ^
               echo '--enable-ccache'; ^
             } > autogen.input && ^
             cat autogen.input && ^
             echo '=== Verifying cl.exe ===' && ^
             which cl.exe 2>/dev/null || which cl 2>/dev/null || echo 'WARNING: cl.exe not found in PATH' && ^
             ./autogen.sh"

      - name: 🔨 Build VNOffice
        shell: cmd
        run: |
          @echo off
          for /f "usebackq delims=" %%i in (`"C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath`) do set VS_PATH=%%i
          call "%VS_PATH%\VC\Auxiliary\Build\vcvars64.bat" >nul 2>&1
          C:\tools\cygwin\bin\bash.exe -lc "source /tmp/setup_vs.sh 2>/dev/null; cd ~/libreoffice-core && make 2>&1 | tail -500"

      - name: 📦 Verify Windows packages
        shell: cmd
        run: |
          C:\tools\cygwin\bin\bash.exe -lc "cd ~/libreoffice-core && echo '=== Tim file .msi ===' && find workdir/installation -name '*.msi' -o -name '*.exe' 2>/dev/null | head -20 && echo '=== Kiem tra instdir ===' && ls -lh instdir/ 2>/dev/null | head -20"

      - name: 📤 Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: vnoffice-windows-installer
          path: |
            C:\tools\cygwin\home\runneradmin\libreoffice-core\workdir\installation\**\*.msi
            C:\tools\cygwin\home\runneradmin\libreoffice-core\workdir\installation\**\*.exe
            C:\tools\cygwin\home\runneradmin\libreoffice-core\instdir\**
          retention-days: 30

  # =========================================================================
  # 🍎 BUILD macOS (.dmg)
  # =========================================================================
  build-macos:
    name: 🍎 Build macOS (.dmg)
    runs-on: macos-14
    timeout-minutes: 480

    steps:
      - name: 📥 Checkout VNOffice config
        uses: actions/checkout@v4

      # ---------------------------------------------------------------
      # Fix: Dùng Java 17 LTS thay vì 21
      # Java 25 (mặc định trên macos-14 runner 2026) đã remove
      # Security Manager hoàn toàn => hsqldb build lỗi fatal.
      # Java 17 LTS là phiên bản ổn định nhất cho LibreOffice build.
      # ---------------------------------------------------------------
      - name: ☕ Setup Java 17 LTS
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: ☕ Verify Java version
        run: |
          echo "=== Java version ==="
          java -version
          echo "=== JAVA_HOME ==="
          echo $JAVA_HOME
          # Đảm bảo đúng Java 17, không phải 25+
          JAVA_MAJOR=$(java -version 2>&1 | head -1 | sed 's/.*"\([0-9]*\)\..*/\1/')
          echo "Java major version: $JAVA_MAJOR"
          if [ "$JAVA_MAJOR" -gt "21" ]; then
            echo "::warning::Java version $JAVA_MAJOR detected. hsqldb may fail with Security Manager errors."
          fi

      - name: 🔧 Install dependencies
        run: |
          # Uninstall homebrew pkg-config (LibreOffice configure rejects it)
          brew uninstall --ignore-dependencies pkg-config 2>/dev/null || true
          brew install autoconf automake ccache \
            gettext gperf nasm ant make
          # Add GNU make to PATH (brew installs as gmake, we need 'make' >= 4.0)
          echo "$(brew --prefix)/opt/make/libexec/gnubin" >> $GITHUB_PATH
          # Verify
          echo "GNU Make version:" && make --version | head -1

      - name: 💾 Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/ccache
          key: ccache-macos-${{ github.sha }}
          restore-keys: ccache-macos-

      - name: 📥 Clone LibreOffice source
        run: |
          git clone --depth 1 --branch ${{ env.LIBREOFFICE_BRANCH }} \
            https://git.libreoffice.org/core libreoffice-core || \
          git clone --depth 1 https://git.libreoffice.org/core libreoffice-core

      - name: 🎨 Apply VNOffice branding
        run: |
          cd libreoffice-core
          chmod +x $GITHUB_WORKSPACE/scripts/apply-branding.sh
          export VNOFFICE_VERSION="${{ env.VNOFFICE_VERSION }}"
          bash $GITHUB_WORKSPACE/scripts/apply-branding.sh

      # ---------------------------------------------------------------
      # Configure: Thêm các flag tắt scripting beanshell/javascript
      # để tránh lỗi hsqldb + Security Manager trên Java mới
      # ---------------------------------------------------------------
      - name: ⚙️ Configure build
        run: |
          cd libreoffice-core
          printf '%s\n' \
            "--with-vendor=PHẠM VĂN THƯƠNG - info@vnoffice.org" \
            "--with-package-version=${{ env.VNOFFICE_VERSION }}" \
            "--with-lang=${{ env.BUILD_LANGS }}" \
            "--enable-release-build" \
            "--disable-online-update" \
            "--disable-odk" \
            "--without-doxygen" \
            "--without-help" \
            "--without-junit" \
            "--with-jdk-home=$JAVA_HOME" \
            "--enable-ccache" \
            "--disable-scripting-beanshell" \
            "--disable-scripting-javascript" \
            > autogen.input
          echo "=== autogen.input ==="
          cat autogen.input
          ./autogen.sh

      - name: 🔨 Build VNOffice
        run: |
          set -o pipefail
          cd libreoffice-core
          make -j$(sysctl -n hw.ncpu) 2>&1 | tail -500

      - name: 📦 Create .dmg
        run: |
          cd libreoffice-core

          # Tìm .app trong instdir
          APP=$(find instdir -name "*.app" -maxdepth 1 2>/dev/null | head -1)
          if [ -z "$APP" ]; then
            echo "::error::Không tìm thấy .app trong instdir/"
            ls -la instdir/ 2>/dev/null
            exit 1
          fi

          echo "Found app: $APP"

          # Đổi tên app → VNOffice
          NEW_APP="instdir/VNOffice.app"
          mv "$APP" "$NEW_APP"

          # Sửa Info.plist
          PLIST="$NEW_APP/Contents/Info.plist"
          if [ -f "$PLIST" ]; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleName VNOffice" "$PLIST" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName VNOffice" "$PLIST" 2>/dev/null || true
          fi

          # Tạo DMG
          hdiutil create -volname "VNOffice" \
            -srcfolder "$NEW_APP" \
            -ov -format UDZO \
            "VNOffice-${{ env.VNOFFICE_VERSION }}-macOS.dmg"

          echo "=== DMG files ==="
          find . -name "*.dmg" | head -5
          ls -lh *.dmg 2>/dev/null

      - name: 📤 Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: vnoffice-macos-dmg
          path: |
            libreoffice-core/*.dmg
            libreoffice-core/workdir/installation/**/*.dmg
          retention-days: 30

  # =========================================================================
  # 🚀 CREATE RELEASE — Tự động tạo trang download
  # =========================================================================
  release:
    name: 🚀 Create GitHub Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: 📥 Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: 🚀 Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "VNOffice ${{ github.ref_name }} — Bộ phần mềm văn phòng miễn phí"
          body: |
            # 🇻🇳 VNOffice ${{ github.ref_name }}

            **Bộ phần mềm văn phòng miễn phí** cho cá nhân và doanh nghiệp.

            ## 📦 Tải về
            | Hệ điều hành | File |
            |---|---|
            | 🪟 Windows | VNOffice-Setup.msi |
            | 🍎 macOS | VNOffice.dmg |

            ## ✨ Tính năng
            - 📝 **VNOffice Writer** — Soạn thảo văn bản (thay Word)
            - 📊 **VNOffice Calc** — Bảng tính (thay Excel)
            - 🎬 **VNOffice Impress** — Trình chiếu (thay PowerPoint)
            - 🖼️ **VNOffice Draw** — Vẽ sơ đồ (thay Visio)
            - 🗄️ **VNOffice Base** — Cơ sở dữ liệu (thay Access)
            - 🔢 **VNOffice Math** — Công thức toán

            ## 📄 Hỗ trợ định dạng file
            ✅ .docx .doc .xlsx .xls .pptx .ppt .pdf .odt .ods .odp

            ## 🇻🇳 Đặc biệt cho người Việt
            - Giao diện & cài đặt **100% tiếng Việt**
            - Font tiếng Việt có sẵn
            - Templates công văn, hợp đồng, bảng lương VN
            - Cấu hình mặc định chuẩn Việt Nam

            ## 📞 Liên hệ
            - **Chủ sở hữu**: PHẠM VĂN THƯƠNG
            - **Email**: info@vnoffice.org
            - **Giấy phép**: MPL 2.0 — Miễn phí, không giới hạn
          files: release-artifacts/**/*
          draft: false
          prerelease: false
